<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Gemini Simulation — Sai Naveen</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root {
    --bg: #05070a;
    --card: #111318;
    --border: #2c2e33;
    --accent: #4e8cff; /* Gemini Blue */
    --accent2: #b588ff; /* Gemini Purple */
    --text: #e8eaed;
    --muted: #9aa0a6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
    font-family: 'Google Sans', 'Inter', system-ui, sans-serif;
    background: 
        radial-gradient(circle at 0% 0%, rgba(78, 140, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(181, 136, 255, 0.1) 0%, transparent 40%),
        var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 30px 20px;
}
.page{max-width:1280px;margin:0 auto;}
header{text-align:left;margin-bottom:30px; border-left: 4px solid var(--accent); padding-left: 20px;}
.pill{display:inline-flex; align-items:center; gap:8px; padding:4px 12px; border-radius:8px; background: rgba(78, 140, 255, 0.1); color: var(--accent); font-weight: 500; font-size: 12px; margin-bottom: 10px;}
h1{font-size:32px; font-weight: 400; letter-spacing:-0.5px; margin-bottom: 8px; background: linear-gradient(90deg, #4e8cff, #b588ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.sub{color:var(--muted); font-size:15px;}

.grid{display:grid; grid-template-columns: 1fr; gap:24px;}
@media(min-width:1024px){.grid{grid-template-columns: 1fr 1fr;}}

.card{background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; transition: 0.3s;}
.card:hover{border-color: #444;}
.card-title{font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px;}

textarea{
    width:100%; min-height:300px; padding:16px; border-radius:16px; border:1px solid var(--border); 
    background:#0b0d11; color:#bdc1c6; font-family: "JetBrains Mono", monospace; font-size:13px; outline:none;
}
textarea:focus{border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent);}

.controls{display:flex; gap:12px; margin-top:20px; align-items:center;}
.btn{
    background: var(--text); color: var(--bg); border:none; border-radius:100px; 
    padding:10px 24px; font-weight:500; cursor:pointer; font-size:14px; transition: 0.2s;
}
.btn:hover{background: #fff; transform: scale(1.02);}
.btn-sec{
    background: transparent; border: 1px solid var(--border); color: var(--text); 
    border-radius:100px; padding:10px 20px; cursor:pointer; font-size:14px;
}
.btn-sec:hover{background: rgba(255,255,255,0.05);}

.tabs{display:flex; gap:8px; margin-bottom:20px;}
.tab{
    padding:8px 16px; font-size:14px; border-radius:100px; border:1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; transition: 0.2s;
}
.tab.active{background: rgba(78, 140, 255, 0.1); color: var(--accent); border-color: var(--accent);}

.table-wrap{border-radius:16px; border:1px solid var(--border); overflow: hidden;}
table{width:100%; border-collapse:collapse; background: #0b0d11;}
th{background: #111318; padding: 12px; text-align: left; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border);}
td{padding: 12px; font-size: 13px; border-bottom: 1px solid var(--border);}
.badge{padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;}
.badge.KEYWORD{color: #8ab4f8; background: rgba(138, 180, 248, 0.1);}
.badge.IDENTIFIER{color: #81c995; background: rgba(129, 201, 149, 0.1);}

footer{
    margin-top:40px; padding-top:20px; border-top: 1px solid var(--border);
    display:flex; justify-content: space-between; color: var(--muted); font-size: 14px;
}
.hidden {display: none;}
</style>
</head>
<body>
<div class="page">
<header>
  <div class="pill">Powered by Gemini UI</div>
  <h1>Compiler Design Simulation</h1>
  <p class="sub">Advanced Lexical Analysis and Target Code Generation</p>
</header>

<div class="grid">
  <div class="card">
    <div class="card-title">Code Editor</div>
    <textarea id="code" spellcheck="false">
int main() {
    int x = 10;
    if (x > 5) {
        print("Success");
    }
    return 0;
}</textarea>
    <div class="controls">
      <button class="btn" id="run">Run Simulation</button>
      <button class="btn-sec" id="clear">Clear</button>
      <span id="status" style="font-size: 12px; color: var(--muted)">Ready</span>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" data-tab="tokens">Tokens</button>
      <button class="tab" data-tab="tac">TAC</button>
      <button class="tab" data-tab="asm">Assembly</button>
    </div>
    <div id="panel-tokens" class="table-wrap">
        <table>
            <thead><tr><th>Token</th><th>Type</th><th>Line</th></tr></thead>
            <tbody id="token-tbody"><tr><td colspan="3" style="text-align:center; padding:40px; color:var(--muted)">Run to see lexemes</td></tr></tbody>
        </table>
    </div>
    <div id="panel-tac" class="hidden" style="font-family: monospace; padding: 10px;">TAC Output...</div>
    <div id="panel-asm" class="hidden" style="font-family: monospace; padding: 10px;">Assembly Output...</div>
  </div>
</div>

<footer>
  <div>Student: <strong>Sai Naveen</strong></div>
  <div>ID: <strong>RA2311003050059</strong></div>
</footer>
</div>

<script>
    // Logic for tab switching
    document.querySelectorAll('.tab').forEach(button => {
        button.onclick = () => {
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            const target = button.getAttribute('data-tab');
            ['tokens', 'tac', 'asm'].forEach(p => {
                document.getElementById('panel-' + p).classList.add('hidden');
            });
            document.getElementById('panel-' + target).classList.remove('hidden');
        };
    });
</script>
</body>
</html>
