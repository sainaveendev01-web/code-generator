<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Instagram Simulation — Sai Naveen</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root {
    --ig-bg: #000000;
    --ig-card: #121212;
    --ig-border: #262626;
    --ig-link: #0095f6;
    --ig-text: #f5f5f5;
    --ig-muted: #a8a8a8;
    --ig-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
}
*{box-sizing:border-box; margin:0; padding:0;}
body {
    background-color: var(--ig-bg);
    color: var(--ig-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
.navbar {
    height: 60px; border-bottom: 1px solid var(--ig-border);
    display: flex; align-items: center; justify-content: center;
    position: sticky; top: 0; background: var(--ig-bg); z-index: 100;
}
.nav-content { width: 100%; max-width: 935px; display: flex; justify-content: space-between; padding: 0 20px; font-weight: bold; font-size: 18px; }

.main-container { max-width: 935px; margin: 30px auto; display: grid; grid-template-columns: 1fr; gap: 28px; padding: 0 10px; }
@media(min-width: 768px) { .main-container { grid-template-columns: 1.5fr 1fr; } }

/* Feed Card Style */
.card { background: var(--ig-bg); border: 1px solid var(--ig-border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
.card-header { padding: 14px; display: flex; align-items: center; gap: 12px; }
.avatar { 
    width: 32px; height: 32px; border-radius: 50%; padding: 2px;
    background: var(--ig-grad);
}
.avatar-inner { width: 100%; height: 100%; background: #000; border-radius: 50%; border: 2px solid #000; }

.editor-box { background: #000; padding: 0 10px 10px; }
textarea {
    width: 100%; min-height: 250px; background: #000; color: #fff;
    border: none; padding: 15px; font-family: 'Courier New', monospace; font-size: 14px; outline: none; resize: vertical;
}

.action-bar { padding: 12px; display: flex; gap: 15px; border-top: 1px solid var(--ig-border); }
.ig-btn { background: var(--ig-link); color: white; border: none; padding: 7px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
.ig-btn:hover { background: #1877f2; }

/* Table/Results Style */
.results-header { padding: 12px; font-weight: 600; border-bottom: 1px solid var(--ig-border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 12px; color: var(--ig-muted); border-bottom: 1px solid var(--ig-border); }
td { padding: 12px; border-bottom: 1px solid #1a1a1a; }

.token-type { color: var(--ig-link); font-weight: 500; }

footer {
    max-width: 935px; margin: 50px auto; padding: 20px; text-align: center;
    border-top: 1px solid var(--ig-border); color: var(--ig-muted); font-size: 12px;
}
</style>
</head>
<body>

<div class="navbar">
    <div class="nav-content">
        <span>CompilerGram</span>
        <div style="font-size: 14px; color: var(--ig-link);">Simulation Active</div>
    </div>
</div>

<div class="main-container">
    <section>
        <div class="card">
            <div class="card-header">
                <div class="avatar"><div class="avatar-inner"></div></div>
                <div style="font-size: 14px; font-weight: 600;">sai_naveen_compiler</div>
            </div>
            <div class="editor-box">
                <textarea id="code" placeholder="Write your code here...">
int main() {
    float result = 50.5;
    if (result > 10) {
        return 1;
    }
}</textarea>
            </div>
            <div class="action-bar">
                <button class="ig-btn" id="run">Analyze</button>
                <button style="background:transparent; border:none; color:var(--ig-text); cursor:pointer; font-weight:600;" id="clear">Reset</button>
            </div>
        </div>
    </section>

    <aside>
        <div class="card">
            <div class="results-header">Output Analysis</div>
            <div style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr><th>Lexeme</th><th>Token</th></tr>
                    </thead>
                    <tbody id="token-tbody">
                        <tr><td colspan="2" style="text-align:center; padding:30px; color:var(--ig-muted);">No analysis data yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </aside>
</div>

<footer>
    <div style="margin-bottom: 10px;">
        <span style="margin-right: 15px;">SAI NAVEEN</span>
        <span>REG NO: RA2311003050059</span>
    </div>
    <p>© 2026 COMPILER DESIGN PROJECT</p>
</footer>

<script>
    // Theme is purely visual. You can add your specific 
    // Lexical Analysis JS logic here to populate the table.
    document.getElementById('run').onclick = function() {
        const tbody = document.getElementById('token-tbody');
        tbody.innerHTML = `
            <tr><td>int</td><td class="token-type">KEYWORD</td></tr>
            <tr><td>main</td><td class="token-type">IDENTIFIER</td></tr>
            <tr><td>(</td><td class="token-type">OPERATOR</td></tr>
            <tr><td>)</td><td class="token-type">OPERATOR</td></tr>
        `;
    };
</script>

</body>
</html>
